spring.application.name=talentbridge

admin.user=${ADMIN_USER:admin}
admin.password=${ADMIN_PASSWORD:TbAdmin!2026_S7qP9x}

logging.level.root=INFO
logging.level.com.talentbridge=INFO

spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.from=${MAIL_FROM:noreply@talentbridge.cl}
spring.mail.from-name=${MAIL_FROM_NAME:TalentBridge}
spring.mail.provider=${MAIL_PROVIDER:smtp}
brevo.api-key=${BREVO_API_KEY:}
brevo.api-url=${BREVO_API_URL:https://api.brevo.com/v3/smtp/email}
app.public-url=${APP_PUBLIC_URL:https://www.talentbridge.cl}
recordatorio-publicacion.enabled=${RECORDATORIO_PUBLICACION_ENABLED:true}
recordatorio-publicacion.cron=${RECORDATORIO_PUBLICACION_CRON:0 0 * * * *}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.resolve-lazily=true

content.moderation.enabled=${CONTENT_MODERATION_ENABLED:true}
content.moderation.provider=${CONTENT_MODERATION_PROVIDER:sightengine}
sightengine.api-url=${SIGHTENGINE_API_URL:https://api.sightengine.com/1.0/check.json}
sightengine.api-user=${SIGHTENGINE_API_USER:}
sightengine.api-secret=${SIGHTENGINE_API_SECRET:}
sightengine.models=${SIGHTENGINE_MODELS:nudity-2.1}
sightengine.threshold.adult=${SIGHTENGINE_THRESHOLD_ADULT:0.75}
sightengine.threshold.suggestive=${SIGHTENGINE_THRESHOLD_SUGGESTIVE:0.9}
