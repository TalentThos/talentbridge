<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es" th:replace="base :: base(~{::body}, ~{::title})">
<head>
    <title>Crear contraseña - TalentBridge</title>
</head>
<body>
<div class="d-flex justify-content-center align-items-center min-vh-100 bg-light py-4">
    <div class="bg-white p-5 rounded-4 shadow" style="width: 100%; max-width: 440px;">
        <div class="text-center mb-4">
            <img th:src="@{/img/logo.png}" alt="Logo TalentBridge" style="width: 72px;">
            <h2 class="fw-bold mt-2">Talent<span class="text-primary">Bridge</span></h2>
            <p class="text-muted mb-0">Tu aviso ya esta publicado</p>
        </div>

        <h4 class="text-center mb-3">Crea tu contraseña</h4>
        <p class="text-center text-muted small">
            Con esta contraseña podras entrar despues para editar tu servicio o publicar nuevos avisos.
        </p>

        <form id="crearPasswordForm">
            <div class="mb-3">
                <input type="email" id="email" class="form-control" placeholder="Correo usado" required>
            </div>
            <div class="mb-3">
                <input type="password" id="password" class="form-control" placeholder="Contrasena" minlength="6" required>
                <div class="form-text">Minimo 6 caracteres.</div>
            </div>
            <div class="mb-3">
                <input type="password" id="confirmarPassword" class="form-control" placeholder="Repetir contrasena" minlength="6" required>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="crearPasswordButton">
                <i class="bi bi-key" aria-hidden="true"></i>Guardar contraseña
            </button>
        </form>

        <div class="text-center mt-3">
            <small><a th:href="@{/buscar}">Ver servicios publicados</a></small>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const params = new URLSearchParams(window.location.search);
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmarInput = document.getElementById('confirmarPassword');
    const button = document.getElementById('crearPasswordButton');
    emailInput.value = params.get('email') || '';

    document.getElementById('crearPasswordForm').addEventListener('submit', async function (event) {
        event.preventDefault();

        if (passwordInput.value !== confirmarInput.value) {
            Swal.fire('Revisa tu contrasena', 'Las contrasenas no coinciden.', 'warning');
            return;
        }

        button.disabled = true;
        button.textContent = 'Guardando...';
        try {
            const response = await fetch('/api/publicaciones/crear-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: emailInput.value.trim(),
                    password: passwordInput.value,
                    confirmarPassword: confirmarInput.value
                })
            });

            if (response.ok) {
                Swal.fire({
                    icon: 'success',
                    title: 'Contrasena creada',
                    text: 'Ya puedes ingresar a tu cuenta para administrar tu aviso.',
                    confirmButtonText: 'Ingresar'
                }).then(() => {
                    window.location.href = '/login';
                });
                return;
            }

            const text = await response.text();
            Swal.fire('No pudimos guardar la contrasena', text || 'Intenta nuevamente.', 'error');
        } catch (error) {
            Swal.fire('No pudimos guardar la contrasena', error.message || 'Intenta nuevamente.', 'error');
        } finally {
            button.disabled = false;
            button.innerHTML = '<i class="bi bi-key" aria-hidden="true"></i>Guardar contraseña';
        }
    });
});
</script>
</body>
</html>
