<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="base :: base(~{::body}, ~{::title})">
<head>
    <title th:text="${servicio.id} != null ? 'Editar servicio' : 'Publicar servicio'">Publicar servicio</title>
</head>
<body>
<div class="col-md-8 offset-md-2">
    <h2 class="mb-4" th:text="${servicio.id} != null ? 'Editar servicio' : 'Publicar nuevo servicio'">Publicar nuevo servicio</h2>
    <form id="crearServicioForm" th:object="${servicio}" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label">Título del servicio</label>
            <input type="text" th:field="*{titulo}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea th:field="*{descripcion}" class="form-control" rows="4" required></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">LinkedIn</label>
            <input type="url" th:field="*{linkedin}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Instagram</label>
            <input type="url" th:field="*{instagram}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Categoría</label>
            <select th:field="*{categoriaId}" id="categoria" class="form-select" required>
                <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Subcategoría</label>
            <select th:field="*{subcategoriaId}" id="subcategoria" class="form-select" required></select>
        </div>
        <div class="mb-3">
            <label class="form-label">Imágenes</label>
            <input type="file" th:field="*{imagenes}" id="imagenes" multiple />
            <div id="imagenesEliminarContainer"></div>
        </div>
        <button type="submit" class="btn btn-success" th:text="${servicio.id} != null ? 'Actualizar' : 'Publicar'">Publicar</button>
    </form>
</div>

<script th:inline="javascript">
  document.addEventListener('DOMContentLoaded', function () {
    // -----------------------------
    // DOM y datos Thymeleaf
    // -----------------------------
    const form = document.getElementById('crearServicioForm');
    const categoriaSelect = document.getElementById('categoria');
    const subcategoriaSelect = document.getElementById('subcategoria');
    const inputImagenes = document.getElementById('imagenes');
    const imagenesEliminarContainer = document.getElementById('imagenesEliminarContainer');

    const servicioId = /*[[${servicio.id}]]*/ null;
    const imagenesExistentes = /*[[${servicio.imagenesExistentes}]]*/ [];
    const esEdicion = servicioId !== null;

    // Valor inicial de subcategoría desde el modelo (no desde el DOM)
    const subcategoriaInicial = /*[[${servicio.subcategoriaId}]]*/ null;
    const subcategoriaInicialStr = subcategoriaInicial != null ? String(subcategoriaInicial) : null;
    let debePreseleccionarSubcat = !!subcategoriaInicialStr;

    // -----------------------------
    // Choices (selects)
    // -----------------------------
    let subcatChoices = null;
    if (window.Choices) {
      new Choices(categoriaSelect);
      subcatChoices = new Choices(subcategoriaSelect);
    }

    // Cargar subcategorías por categoría y (una sola vez) preseleccionar la inicial
    async function cargarSubcategorias(categoriaId) {
      // Reset visual/estado antes de cargar
      if (subcatChoices) {
        subcatChoices.clearChoices();
        subcatChoices.removeActiveItems();
        subcatChoices.setChoiceByValue('');
        subcatChoices.disable();
      } else {
        subcategoriaSelect.innerHTML = '';
        subcategoriaSelect.value = '';
        subcategoriaSelect.disabled = true;
      }

      if (!categoriaId) return;

      const resp = await securedFetch(`/api/categorias/${categoriaId}/subcategorias`);
      if (!resp || !resp.ok) return;

      const data = await resp.json();
      if (!Array.isArray(data) || data.length === 0) return;

      if (subcatChoices) {
        subcatChoices.setChoices(
          data.map(sc => ({ value: String(sc.id), label: sc.nombre })),
          'value',
          'label',
          true
        );
        subcatChoices.enable();

        // Aplicar preselección solo una vez (carga inicial)
        if (debePreseleccionarSubcat && subcategoriaInicialStr) {
          subcatChoices.setChoiceByValue(subcategoriaInicialStr);
          debePreseleccionarSubcat = false;
        }
      } else {
        data.forEach(sc => {
          const opt = document.createElement('option');
          opt.value = String(sc.id);
          opt.textContent = sc.nombre;
          subcategoriaSelect.appendChild(opt);
        });
        subcategoriaSelect.disabled = false;

        if (debePreseleccionarSubcat && subcategoriaInicialStr) {
          subcategoriaSelect.value = subcategoriaInicialStr;
          debePreseleccionarSubcat = false;
        }
      }
    }

    // Cambiar categoría => recargar subcategorías (sin re-forzar la preselección inicial)
    categoriaSelect.addEventListener('change', e => {
      debePreseleccionarSubcat = false;
      cargarSubcategorias(e.target.value);
    });

    // Carga inicial
    cargarSubcategorias(categoriaSelect.value);

    // -----------------------------
    // Galería de imágenes EXISTENTES (solo vista + marcar para borrar)
    // -----------------------------
    if (esEdicion && Array.isArray(imagenesExistentes) && imagenesExistentes.length) {
      const galeria = document.createElement('div');
      galeria.id = 'galeriaExistentes';
      galeria.className = 'row g-2 mb-2';
      inputImagenes.insertAdjacentElement('beforebegin', galeria);

      imagenesExistentes.forEach(img => {
        const col = document.createElement('div');
        col.className = 'col-6 col-md-4 col-lg-3';
        col.dataset.imgId = img.id;

        const card = document.createElement('div');
        card.className = 'border rounded p-2 text-center';

        const image = document.createElement('img');
        image.src = img.datosBase64
          ? `data:${img.contentType || 'image/jpeg'};base64,${img.datosBase64}`
          : '';
        image.alt = 'Imagen existente';
        image.className = 'img-fluid';

        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn btn-sm btn-outline-danger mt-2';
        btn.textContent = 'Eliminar';

        btn.addEventListener('click', () => {
          const marked = btn.classList.toggle('active');
          if (marked) {
            btn.textContent = 'Se eliminará';
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'imagenesEliminar';
            input.value = img.id;
            input.dataset.deleteId = img.id;
            imagenesEliminarContainer.appendChild(input);
            card.classList.add('opacity-50');
          } else {
            btn.textContent = 'Eliminar';
            const hidden = imagenesEliminarContainer.querySelector(
              `input[name="imagenesEliminar"][value="${img.id}"]`
            );
            if (hidden) hidden.remove();
            card.classList.remove('opacity-50');
          }
        });

        card.append(image, btn);
        col.appendChild(card);
        galeria.appendChild(col);
      });
    }

    // -----------------------------
    // FilePond SOLO para archivos NUEVOS
    // -----------------------------
    let pond = null;
    if (window.FilePond) {
      if (window.FilePondPluginImagePreview) FilePond.registerPlugin(FilePondPluginImagePreview);
      pond = FilePond.create(inputImagenes, {
        allowMultiple: true,
        storeAsFile: true // los nuevos quedan en FilePond; NO confíes en input.files
      });
    }

    // Construir x-www-form-urlencoded (sin archivos)
    function construirParamsSinArchivos() {
      const params = new URLSearchParams();
      params.set('titulo', form.querySelector('[name="titulo"]').value.trim());
      params.set('descripcion', form.querySelector('[name="descripcion"]').value.trim());
      params.set('linkedin', form.querySelector('[name="linkedin"]').value.trim());
      params.set('instagram', form.querySelector('[name="instagram"]').value.trim());
      params.set('categoriaId', form.querySelector('[name="categoriaId"]').value);
      params.set('subcategoriaId', form.querySelector('[name="subcategoriaId"]').value);
      imagenesEliminarContainer
        .querySelectorAll('input[name="imagenesEliminar"]')
        .forEach(h => params.append('imagenesEliminar', h.value));
      return params;
    }

    // Construir FormData MANUAL con archivos NUEVOS desde FilePond
    function construirFormDataConNuevosArchivos() {
      const fd = new FormData();
      fd.set('titulo', form.querySelector('[name="titulo"]').value.trim());
      fd.set('descripcion', form.querySelector('[name="descripcion"]').value.trim());
      fd.set('linkedin', form.querySelector('[name="linkedin"]').value.trim());
      fd.set('instagram', form.querySelector('[name="instagram"]').value.trim());
      fd.set('categoriaId', form.querySelector('[name="categoriaId"]').value);
      fd.set('subcategoriaId', form.querySelector('[name="subcategoriaId"]').value);

      // ids marcados para eliminar
      imagenesEliminarContainer
        .querySelectorAll('input[name="imagenesEliminar"]')
        .forEach(h => fd.append('imagenesEliminar', h.value));

      // Nuevos archivos desde FilePond
      if (pond) {
        pond.getFiles().forEach(item => {
          if (item && item.file) {
            fd.append('imagenes', item.file, item.file.name || 'archivo');
          }
        });
      }
      return fd;
    }

    // -----------------------------
    // Envío del formulario
    // -----------------------------
    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      const url = esEdicion
        ? `/api/oferente/servicios/${servicioId}/actualizar`
        : '/api/oferente/servicios/crear';
      const method = esEdicion ? 'PUT' : 'POST';

      let response;

      // ¿Hay archivos nuevos en FilePond?
      const hayNuevos = pond && pond.getFiles().length > 0;

      if (esEdicion && !hayNuevos) {
        // SIN archivos nuevos => NO multipart
        const params = construirParamsSinArchivos();
        response = await securedFetch(url, {
          method,
          headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
          body: params.toString(),
          credentials: 'include'
        });
      } else {
        // Con archivos nuevos (o creación) => multipart
        const fd = esEdicion ? construirFormDataConNuevosArchivos() : new FormData(form);
        response = await securedFetch(url, {
          method,
          body: fd,
          credentials: 'include'
        });
      }

      if (!response) return;

      if (response.ok) {
        Swal.fire('Éxito', esEdicion ? 'Servicio actualizado correctamente' : 'Servicio creado correctamente', 'success')
          .then(() => {
            if (esEdicion) {
              // Recargar para reflejar altas/bajas de imágenes
              window.location.reload();
            } else {
              form.reset();
              if (pond) pond.removeFiles();
            }
          });
      } else {
        const texto = await response.text();
        Swal.fire('Error', texto || (esEdicion ? 'No se pudo actualizar el servicio' : 'No se pudo crear el servicio'), 'error');
      }
    });
  });
</script>


</body>
</html>
