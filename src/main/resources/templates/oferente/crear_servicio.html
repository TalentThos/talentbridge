<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="base :: base(~{::body}, ~{::title})">
<head>
    <title>Publicar servicio</title>
</head>
<body>
<div class="col-md-8 offset-md-2">
    <h2 class="mb-4">Publicar nuevo servicio</h2>
    <form id="crearServicioForm" th:object="${servicio}" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label">Título del servicio</label>
            <input type="text" th:field="*{titulo}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea th:field="*{descripcion}" class="form-control" rows="4" required></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Categoría</label>
            <select th:field="*{categoriaId}" id="categoria" class="form-select" required>
                <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Subcategoría</label>
            <select th:field="*{subcategoriaId}" id="subcategoria" class="form-select" required disabled></select>
        </div>
        <div class="mb-3">
            <label class="form-label">Imágenes</label>
            <input type="file" th:field="*{imagenes}" id="imagenes" multiple />
        </div>
        <button type="submit" class="btn btn-success">Publicar</button>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        let subcatChoices = null;
        if (window.Choices) {
            new Choices(document.getElementById('categoria'));
            subcatChoices = new Choices(document.getElementById('subcategoria'));
        }
        let pond = null;
        if (window.FilePond) {
            if (window.FilePondPluginImagePreview) {
                FilePond.registerPlugin(FilePondPluginImagePreview);
            }
            pond = FilePond.create(document.getElementById('imagenes'), {storeAsFile: true});
        }

        const form = document.getElementById('crearServicioForm');
        const categoriaSelect = document.getElementById('categoria');
        const subcategoriaSelect = document.getElementById('subcategoria');

        async function cargarSubcategorias(categoriaId) {
            subcategoriaSelect.innerHTML = '';
            if (subcatChoices) {
                subcatChoices.clearChoices();
                subcatChoices.removeActiveItems();
                subcatChoices.setChoiceByValue('');
                subcatChoices.disable();
            } else {
                subcategoriaSelect.value = '';
                subcategoriaSelect.disabled = true;
            }
            if (!categoriaId) return;
            const resp = await securedFetch(`/api/categorias/${categoriaId}/subcategorias`);
            if (!resp || !resp.ok) return;
            const data = await resp.json();
            if (data.length === 0) return;
            if (subcatChoices) {
                subcatChoices.setChoices(data.map(sc => ({value: sc.id, label: sc.nombre})), 'value', 'label', true);
                subcatChoices.enable();
            } else {
                data.forEach(sc => {
                    const opt = document.createElement('option');
                    opt.value = sc.id;
                    opt.textContent = sc.nombre;
                    subcategoriaSelect.appendChild(opt);
                });
                subcategoriaSelect.disabled = false;
            }
        }

        categoriaSelect.addEventListener('change', e => cargarSubcategorias(e.target.value));
        cargarSubcategorias(categoriaSelect.value);
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(form);
            const response = await securedFetch('/api/oferente/servicios/crear', {
                method: 'POST',
                body: formData,
                credentials: 'include'
            });
            if (!response) return;
            if (response.ok) {
                Swal.fire('Éxito', 'Servicio creado correctamente', 'success');
                form.reset();
                if (pond) { pond.removeFiles(); }
            } else {
                const texto = await response.text();
                Swal.fire('Error', texto || 'No se pudo crear el servicio', 'error');
            }
        });
    });
</script>
</body>
</html>
