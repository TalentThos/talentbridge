<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es" th:replace="base :: base(~{::body}, ~{::title})">
<head>
    <title>Registro - Paso 1</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<div class="d-flex justify-content-center align-items-center vh-100 bg-light">
    <div class="bg-white p-5 rounded-4 shadow" style="width: 100%; max-width: 500px;">
        <div class="text-center mb-4">
            <img th:src="@{/img/logo.png}" alt="Logo TalentBridge" style="width: 60px;" />
            <h2 class="fw-bold mt-2">Talent<span class="text-primary">Bridge</span></h2>
            <p class="text-muted mb-0">Connecting skills with needs</p>
        </div>

        <h4 class="text-center mb-3">Paso 1: Datos personales</h4>

        <form id="registroPaso1Form" class="needs-validation" novalidate>
            <div class="mb-3">
                <input type="text" id="nombre" class="form-control" placeholder="Nombre completo" required>
            </div>

           <div class="mb-3">
               <input type="email" id="email" class="form-control" placeholder="Correo electrónico" required>
           </div>

            <div class="mb-3">
                <input type="tel" id="numeroMovil" class="form-control" placeholder="Número móvil" required>
            </div>

            <div class="row">
                <div class="col-6 mb-3">
                    <select class="form-select" id="tipoDocumento" required>
                        <option value="">Tipo doc.</option>
                        <option value="RUT">RUT (Chile)</option>
                        <option value="DNI">DNI (extranjero)</option>
                    </select>
                </div>
                <div class="col-6 mb-3">
                    <input type="text" id="numeroDocumento" class="form-control" placeholder="N° documento" required>
                </div>
            </div>

            <div class="mb-3">
                <select class="form-select" id="pais" required>
                    <option value="Chile" selected>Chile</option>
                </select>
            </div>


            <div class="mb-3">
                <input type="text" id="ciudad" class="form-control" placeholder="Ciudad" required>
            </div>

            <div class="mb-3">
                <input type="text" id="calle" class="form-control" placeholder="Calle" required>
            </div>

            <div class="mb-3">
                <input type="text" id="numeroDireccion" class="form-control" placeholder="N° de dirección" required>
            </div>

            <div class="mb-3">
                <input type="password" id="password" class="form-control" placeholder="Contraseña" required minlength="6">
            </div>

            <button type="submit" class="btn btn-primary w-100" id="continuarButton">Continuar</button>

            <div class="text-center mt-3">
                <small>¿Ya tienes cuenta? <a th:href="@{/login}">Inicia sesión</a></small>
            </div>
        </form>
    </div>
</div>

<div class="modal fade" id="registroLoadingModal" tabindex="-1" aria-labelledby="registroLoadingTitle" aria-hidden="true"
     data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-body text-center p-4">
                <div class="spinner-border text-primary mb-3" role="status" aria-hidden="true"></div>
                <h5 class="modal-title mb-2" id="registroLoadingTitle">Validando datos</h5>
                <p class="text-muted mb-0">Estamos registrando tu información. Un momento, por favor.</p>
            </div>
        </div>
    </div>
</div>

<script>
    function limpiarRut(rut) {
        const normalizado = rut.toUpperCase().replace(/[^0-9K]/g, '');
        if (normalizado.length <= 1) {
            return normalizado;
        }

        const cuerpo = normalizado.slice(0, -1).replace(/K/g, '');
        const digitoVerificador = normalizado.slice(-1);

        return `${cuerpo}${digitoVerificador}`.slice(0, 9);
    }

    function formatearRut(rut) {
        const rutLimpio = limpiarRut(rut);
        if (rutLimpio.length <= 1) {
            return rutLimpio;
        }

        const cuerpo = rutLimpio.slice(0, -1);
        const digitoVerificador = rutLimpio.slice(-1);
        const cuerpoFormateado = cuerpo.replace(/\B(?=(\d{3})+(?!\d))/g, '.');

        return `${cuerpoFormateado}-${digitoVerificador}`;
    }

    function actualizarFormatoDocumento() {
        const tipoDocumento = document.getElementById("tipoDocumento");
        const numeroDocumento = document.getElementById("numeroDocumento");

        if (tipoDocumento.value === "RUT") {
            numeroDocumento.value = formatearRut(numeroDocumento.value);
            numeroDocumento.placeholder = "XX.XXX.XXX-X";
            numeroDocumento.maxLength = 12;
        } else {
            numeroDocumento.placeholder = "N° documento";
            numeroDocumento.removeAttribute("maxlength");
        }
    }

   document.getElementById("tipoDocumento").addEventListener("change", actualizarFormatoDocumento);
   document.getElementById("numeroDocumento").addEventListener("input", actualizarFormatoDocumento);

   document.getElementById("registroPaso1Form").addEventListener("submit", async function (e) {
       e.preventDefault();
       const form = e.target;
       if (!form.checkValidity()) {
           form.classList.add('was-validated');
           return;
       }

       const continuarButton = document.getElementById("continuarButton");
       const loadingModalElement = document.getElementById("registroLoadingModal");
       const loadingModal = window.bootstrap
           ? new bootstrap.Modal(loadingModalElement)
           : null;

       continuarButton.disabled = true;
       continuarButton.textContent = "Validando...";
       loadingModal?.show();

       const data = {
           nombre: form.nombre.value,
           email: form.email.value,
           numeroMovil: form.numeroMovil.value,
           tipoDocumento: form.tipoDocumento.value,
           numeroDocumento: form.tipoDocumento.value === "RUT"
               ? limpiarRut(form.numeroDocumento.value)
               : form.numeroDocumento.value,
           pais: form.pais.value,
           ciudad: form.ciudad.value,
           calle: form.calle.value,
           numeroDireccion: form.numeroDireccion.value,
           password: form.password.value
       };

       try {
           const res = await fetch('/api/registro/paso1', {
               method: 'POST',
               headers: { 'Content-Type': 'application/json' },
               body: JSON.stringify(data)
           });

           if (res.ok) {
               loadingModal?.hide();
               Swal.fire({
                   icon: 'success',
                   title: 'Datos registrados',
                   text: 'Ahora verifica tu correo',
                   confirmButtonText: 'Continuar'
               }).then(() => window.location.href = '/registro/paso2');
           } else {
               const err = await res.text();
               loadingModal?.hide();
               continuarButton.disabled = false;
               continuarButton.textContent = "Continuar";
               Swal.fire({ icon: 'error', title: 'Error', text: err });
           }

       } catch (error) {
           loadingModal?.hide();
           continuarButton.disabled = false;
           continuarButton.textContent = "Continuar";
           Swal.fire({ icon: 'error', title: 'Error de red', text: error.message });
       }
   });

</script>
</body>
</html>
