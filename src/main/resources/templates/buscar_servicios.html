<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: base(~{::body}, ~{::title})}">
<head>
    <title>Buscar servicios</title>
</head>
<body>
<h2 class="mb-4"><i class="bi bi-search-heart bridge-color me-2" aria-hidden="true"></i>Buscar servicios disponibles</h2>
<form class="row search-filters mb-4" action="/buscar" method="get">
    <div class="col-md-3 mb-2 mb-md-0">
        <input type="text" name="q" th:value="${termino}" class="form-control" placeholder="Ej: profesor guitarra, gasfiter, DJ...">
    </div>
    <div class="col-md-3 mb-2 mb-md-0">
        <select name="categoriaId" id="categoria" class="form-select">
            <option value="" th:text="'Todas las categorias'"></option>
            <option th:each="cat : ${categorias}"
                    th:value="${cat.id}"
                    th:text="${cat.nombre}"
                    th:selected="${cat.id == categoriaId}">
            </option>
        </select>
    </div>
    <div class="col-md-2 mb-2 mb-md-0">
        <select name="subcategoriaId" id="subcategoria" class="form-select" disabled></select>
    </div>
    <div class="col-md-2 mb-2 mb-md-0">
        <select name="pais" id="pais" class="form-select"></select>
    </div>
    <div class="col-md-2">
        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-search" aria-hidden="true"></i>Buscar</button>
    </div>
</form>

<div class="row g-3" th:if="${servicios != null}">
    <div class="col-md-4" th:each="s : ${servicios}">
        <div class="card service-card service-result-card h-100">
            <div class="service-result-media">
                <img th:if="${s.tieneImagenes and s.imagenesExistentes != null and !#lists.isEmpty(s.imagenesExistentes)}"
                     th:src="|data:image/jpeg;base64,${s.imagenesExistentes[0].datosBase64}|"
                     alt="Imagen del servicio">
                <div class="service-result-placeholder"
                     th:unless="${s.tieneImagenes and s.imagenesExistentes != null and !#lists.isEmpty(s.imagenesExistentes)}">
                    <i th:class="'bi ' + ${s.subcategoriaIcono}" aria-hidden="true"></i>
                </div>
            </div>
            <div class="card-body">
                <div class="service-result-tags">
                    <span th:if="${s.categoriaNombre}" th:text="${s.categoriaNombre}">Categoria</span>
                    <span th:if="${s.subcategoriaNombre}" th:text="${s.subcategoriaNombre}">Subcategoria</span>
                </div>
                <h5 th:text="${s.titulo}"></h5>
                <p class="service-result-description" th:text="${s.descripcion}"></p>
                <div class="service-result-provider">
                    <span class="service-result-avatar" th:text="${s.usuarioNombre != null and !#strings.isEmpty(s.usuarioNombre) ? #strings.substring(s.usuarioNombre, 0, 1) : 'T'}">T</span>
                    <div>
                        <strong th:text="${s.usuarioNombre}">Oferente</strong>
                        <small><i class="bi bi-patch-check-fill" aria-hidden="true"></i> Correo verificado</small>
                    </div>
                </div>
                <div class="service-result-actions">
                    <a th:if="${s.numeroMovil != null}" class="btn btn-primary btn-sm" th:href="'tel:' + ${s.numeroMovil}">
                        <i class="bi bi-telephone" aria-hidden="true"></i>Contactar
                    </a>
                    <button th:unless="${s.numeroMovil != null}" type="button" class="btn btn-outline-primary btn-sm" disabled>
                        <i class="bi bi-chat-dots" aria-hidden="true"></i>Mensaje pronto
                    </button>
                    <a th:if="${s.tieneImagenes}" href="#" th:data-id="${s.id}" class="btn btn-sm btn-outline-secondary ver-imagenes">
                        <i class="bi bi-images" aria-hidden="true"></i>Ver imagenes
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<nav th:if="${page != null && page.totalPages > 1}">
    <ul class="pagination">
        <li class="page-item" th:classappend="${page.first}? 'disabled'">
            <a class="page-link" th:href="@{/buscar(q=${termino},categoriaId=${categoriaId},subcategoriaId=${subcategoriaId},pais=${pais},page=${page.number - 1})}">Anterior</a>
        </li>
        <li class="page-item" th:each="i : ${#numbers.sequence(0, page.totalPages-1)}" th:classappend="${i}==${page.number}? 'active'">
            <a class="page-link" th:href="@{/buscar(q=${termino},categoriaId=${categoriaId},subcategoriaId=${subcategoriaId},pais=${pais},page=${i})}" th:text="${i + 1}"></a>
        </li>
        <li class="page-item" th:classappend="${page.last}? 'disabled'">
            <a class="page-link" th:href="@{/buscar(q=${termino},categoriaId=${categoriaId},subcategoriaId=${subcategoriaId},pais=${pais},page=${page.number + 1})}">Siguiente</a>
        </li>
    </ul>
</nav>

<div class="modal fade" id="imagenesModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Imagenes del servicio</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="imagenesCarousel" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner"></div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#imagenesCarousel" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Anterior</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#imagenesCarousel" data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Siguiente</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
/*<![CDATA[*/
document.addEventListener('DOMContentLoaded', function() {
    let subcatChoices = null;
    if (window.Choices) {
        new Choices(document.getElementById('categoria'));
        subcatChoices = new Choices(document.getElementById('subcategoria'));
    }
    const categoriaSelect = document.getElementById('categoria');
    const subcategoriaSelect = document.getElementById('subcategoria');
    const paisSelect = document.getElementById('pais');
    const selectedSubcat = /*[[${subcategoriaId}]]*/ null;
    const selectedCat = /*[[${categoriaId}]]*/ null;
    const selectedPais = /*[[${pais}]]*/ '';

    async function cargarSubcategorias(categoriaId) {
        subcategoriaSelect.innerHTML = '';
        if (subcatChoices) {
            subcatChoices.clearChoices();
            subcatChoices.removeActiveItems();
            subcatChoices.setChoiceByValue('');
            subcatChoices.disable();
        } else {
            subcategoriaSelect.value = '';
            subcategoriaSelect.disabled = true;
        }
        if (!categoriaId) return;
        const resp = await securedFetch(`/api/categorias/${categoriaId}/subcategorias`);
        if (!resp || !resp.ok) return;
        const data = await resp.json();
        if (data.length === 0) return;
        if (subcatChoices) {
            const opciones = [{ value: '', label: 'Todas las subcategorias', selected: true }]
                .concat(data.map(sc => ({ value: sc.id, label: sc.nombre })));
            subcatChoices.setChoices(opciones, 'value', 'label', true);
            subcatChoices.enable();
            if (selectedSubcat) subcatChoices.setChoiceByValue(String(selectedSubcat));
        } else {
            const optDefault = document.createElement('option');
            optDefault.value = '';
            optDefault.textContent = 'Todas las subcategorias';
            subcategoriaSelect.appendChild(optDefault);
            data.forEach(sc => {
                const opt = document.createElement('option');
                opt.value = sc.id;
                opt.textContent = sc.nombre;
                if (selectedSubcat && Number(selectedSubcat) === sc.id) opt.selected = true;
                subcategoriaSelect.appendChild(opt);
            });
            subcategoriaSelect.disabled = false;
        }
    }
    categoriaSelect.addEventListener('change', e => cargarSubcategorias(e.target.value));
    cargarSubcategorias(selectedCat);

    function cargarPaises() {
        if (!paisSelect) return;
        paisSelect.innerHTML = '<option value="">Tu pais</option>';
        const opt = document.createElement('option');
        opt.value = 'Chile';
        opt.textContent = 'Chile';
        if (selectedPais === 'Chile') opt.selected = true;
        paisSelect.appendChild(opt);
    }
    cargarPaises();

    document.querySelectorAll('.ver-imagenes').forEach(btn => {
        btn.addEventListener('click', async function(e) {
            e.preventDefault();
            const id = this.dataset.id;
            const resp = await securedFetch(`/api/servicios/${id}/imagenes`);
            if (!resp || !resp.ok) return;
            const data = await resp.json();
            const carouselInner = document.querySelector('#imagenesCarousel .carousel-inner');
            carouselInner.innerHTML = '';
            data.forEach((img, idx) => {
                const item = document.createElement('div');
                item.className = 'carousel-item' + (idx === 0 ? ' active' : '');
                const image = document.createElement('img');
                image.src = 'data:image/jpeg;base64,' + img;
                image.className = 'd-block w-100';
                item.appendChild(image);
                carouselInner.appendChild(item);
            });
            const modal = new bootstrap.Modal(document.getElementById('imagenesModal'));
            modal.show();
        });
    });
});
/*]]>*/
</script>
</body>
</html>
