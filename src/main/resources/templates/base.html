<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es" th:fragment="base (_arg0, _arg1)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:replace="${_arg1}">TalentBridge</title>
    <link rel="icon" type="image/png" sizes="64x64" th:href="@{/img/favicon.png}">
    <link rel="apple-touch-icon" th:href="@{/img/favicon.png}">

    <script th:src="@{/js/utils.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Choices.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />

    <!-- FilePond -->
    <link href="https://unpkg.com/filepond/dist/filepond.min.css" rel="stylesheet" />
    <link href="https://unpkg.com/filepond-plugin-image-preview/dist/filepond-plugin-image-preview.min.css" rel="stylesheet" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f9f9f9;
            overflow-x: hidden;
        }
        .navbar-brand {
            display: inline-flex;
            align-items: center;
            font-weight: 600;
            font-size: 1.4rem;
            white-space: nowrap;
        }
        .bridge-color {
            color: #246BCE;
        }
        .bi {
            display: inline-block;
            font-size: 1em;
            line-height: 1;
            vertical-align: -0.125em;
        }
        .brand-icon {
            color: #246BCE;
            margin-right: 0.35rem;
            font-size: 1.05rem;
        }
        .brand-logo-img {
            width: 2rem;
            height: 2rem;
            object-fit: contain;
            margin-right: 0.45rem;
        }
        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            white-space: nowrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.45rem;
        }
        .nav-link .bi,
        .btn .bi {
            flex: 0 0 auto;
            font-size: 0.95em;
            margin-right: 0;
        }
        .icon-badge {
            width: 2.75rem;
            height: 2.75rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.9rem;
            color: #246BCE;
            background: rgba(36, 107, 206, 0.1);
            font-size: 1.35rem;
            margin-bottom: 0.75rem;
        }
        footer {
            font-size: 0.9rem;
            background-color: #f2f2f2;
            color: #555B6E;
            padding: 1rem 0;
            text-align: center;
        }
        .card,
        .modal-content,
        .alert {
            overflow-wrap: anywhere;
        }
        .choices,
        .choices__inner {
            width: 100%;
            min-width: 0;
        }
        .carousel-item img {
            max-height: 70vh;
            object-fit: contain;
        }
        .page-hero {
            padding: 4rem 0 3rem;
        }
        .hero-kicker {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.35rem 0.75rem;
            border-radius: 999px;
            color: #1b5fb8;
            background: rgba(36, 107, 206, 0.1);
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .page-actions {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .home-account-actions {
            max-width: 560px;
            margin: 1.5rem auto 0;
            padding: 1rem;
            border: 1px solid #dce8f8;
            border-radius: 0.75rem;
            background: #ffffff;
            box-shadow: 0 0.5rem 1.5rem rgba(15, 23, 42, 0.05);
        }
        .home-account-actions p {
            margin-bottom: 0.75rem;
        }
        .home-account-buttons {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .home-trust-list {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 1rem;
            color: #555B6E;
            font-size: 0.95rem;
        }
        .home-trust-list span {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }
        .publish-landing {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
            gap: 2rem;
            align-items: center;
            padding: 3rem 0 2rem;
        }
        .publish-hero h1 {
            font-size: clamp(2rem, 4vw, 3.5rem);
            line-height: 1.12;
            margin-bottom: 1rem;
        }
        .publish-hero .lead {
            color: #555B6E;
            max-width: 720px;
        }
        .publish-panel {
            background: #ffffff;
            border: 1px solid #dce8f8;
            border-radius: 0.75rem;
            padding: 1.5rem;
            box-shadow: 0 0.75rem 2rem rgba(15, 23, 42, 0.06);
        }
        .publish-panel-header {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: end;
            margin-bottom: 1rem;
        }
        .publish-panel-header p {
            color: #555B6E;
            margin-bottom: 0;
            max-width: 520px;
        }
        .publish-panel h2,
        .publish-panel-header h2 {
            font-size: 1.25rem;
            margin-bottom: 0;
        }
        .publish-category-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.75rem;
        }
        .publish-category-grid span {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            min-height: 2.5rem;
            padding: 0.55rem 0.65rem;
            border: 1px solid #e8edf5;
            border-radius: 0.5rem;
            color: #1f2937;
            background: #f8fbff;
            font-size: 0.95rem;
        }
        .publish-category-grid .bi {
            color: #246BCE;
        }
        .publish-preview-wrap {
            background: #ffffff;
            border: 1px solid #dce8f8;
            border-radius: 0.75rem;
            box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }
        .publish-preview-toolbar {
            display: flex;
            justify-content: space-between;
            gap: 0.75rem;
            align-items: center;
            padding: 0.85rem 1rem;
            background: #f8fbff;
            border-bottom: 1px solid #e8edf5;
            color: #555B6E;
            font-size: 0.85rem;
        }
        .publish-preview-toolbar span {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }
        .publish-preview-live {
            color: #157347;
            font-weight: 600;
        }
        .publish-preview-card {
            padding: 1rem;
        }
        .publish-preview-image {
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.65rem;
            background: linear-gradient(135deg, #eaf3ff 0%, #f6fbff 55%, #eaf8f1 100%);
            color: #246BCE;
            font-size: 3.25rem;
            margin-bottom: 1rem;
        }
        .publish-preview-body h2 {
            font-size: 1.25rem;
            line-height: 1.25;
            margin-bottom: 0.5rem;
        }
        .publish-preview-body p {
            color: #555B6E;
            font-size: 0.95rem;
            margin-bottom: 0.85rem;
        }
        .publish-preview-tags {
            display: flex;
            gap: 0.45rem;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }
        .publish-preview-tags span {
            display: inline-flex;
            align-items: center;
            min-height: 1.8rem;
            padding: 0.25rem 0.55rem;
            border-radius: 999px;
            background: #eef5ff;
            color: #1b5fb8;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .publish-preview-provider {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.75rem;
            border: 1px solid #e8edf5;
            border-radius: 0.65rem;
            background: #fbfdff;
            margin-bottom: 0.85rem;
        }
        .publish-preview-provider small {
            display: block;
            color: #157347;
        }
        .publish-avatar {
            width: 2.5rem;
            height: 2.5rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            background: #246BCE;
            color: #ffffff;
            font-weight: 600;
        }
        .publish-preview-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }
        .publish-preview-note {
            display: flex;
            gap: 0.5rem;
            align-items: flex-start;
            padding: 0 1rem 1rem;
            color: #555B6E;
            font-size: 0.9rem;
        }
        .publish-steps .feature-card {
            min-height: 100%;
        }
        .registration-card {
            width: 100%;
            max-width: 560px;
        }
        .registration-steps {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .registration-step {
            border-radius: 999px;
            padding: 0.45rem 0.75rem;
            background: #eef5ff;
            color: #1b5fb8;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
        }
        .registration-step.is-muted {
            background: #f1f3f6;
            color: #6c757d;
        }
        .registration-helper {
            border: 1px solid #dce8f8;
            border-radius: 0.75rem;
            background: #f8fbff;
            padding: 0.85rem;
            color: #555B6E;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .registration-helper strong {
            color: #1f2937;
        }
        .feature-card {
            height: 100%;
            padding: 1.25rem;
            background: #fff;
            border: 1px solid #e8edf5;
            border-radius: 0.75rem;
            box-shadow: 0 0.5rem 1.5rem rgba(15, 23, 42, 0.04);
        }
        .home-feature-grid > [class*="col-"] {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 150px;
            padding: 1.25rem;
            background: #fff;
            border: 1px solid #e8edf5;
            border-radius: 0.75rem;
            box-shadow: 0 0.5rem 1.5rem rgba(15, 23, 42, 0.04);
        }
        .service-card .card-body {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }
        .service-card p {
            margin-bottom: 0.35rem;
        }
        .service-card a {
            word-break: break-word;
        }
        .service-result-card {
            border: 1px solid #dce8f8;
            border-radius: 0.75rem;
            box-shadow: 0 0.75rem 2rem rgba(15, 23, 42, 0.06);
            overflow: hidden;
        }
        .service-result-media {
            height: 150px;
            background: #f8fbff;
            border-bottom: 1px solid #e8edf5;
        }
        .service-result-media img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }
        .service-result-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #eaf3ff 0%, #f6fbff 55%, #eaf8f1 100%);
            color: #246BCE;
            font-size: 2.75rem;
        }
        .service-result-tags {
            display: flex;
            gap: 0.45rem;
            flex-wrap: wrap;
            margin-bottom: 0.35rem;
        }
        .service-result-tags span {
            display: inline-flex;
            align-items: center;
            min-height: 1.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 999px;
            background: #eef5ff;
            color: #1b5fb8;
            font-size: 0.76rem;
            font-weight: 600;
        }
        .service-result-card h5 {
            line-height: 1.25;
            margin-bottom: 0.25rem;
        }
        .service-result-description {
            color: #555B6E;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .service-result-price {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.75rem;
            color: #0f766e;
            font-size: 0.92rem;
            font-weight: 700;
        }
        .service-result-price i {
            font-size: 1rem;
        }
        .service-result-provider {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.75rem;
            border: 1px solid #e8edf5;
            border-radius: 0.65rem;
            background: #fbfdff;
            margin-top: auto;
        }
        .service-result-provider small {
            display: block;
            color: #157347;
            font-size: 0.8rem;
        }
        .service-result-avatar {
            width: 2.35rem;
            height: 2.35rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            background: #246BCE;
            color: #ffffff;
            font-weight: 600;
            text-transform: uppercase;
        }
        .service-result-actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.5rem;
            margin-top: 0.75rem;
        }
        .service-result-actions .btn:only-child {
            grid-column: 1 / -1;
        }
        .mobile-table-card {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            background: #fff;
            border: 1px solid #e8edf5;
            border-radius: 0.75rem;
        }
        .mobile-table-card table {
            margin-bottom: 0;
            min-width: 640px;
        }
        @media (max-width: 575.98px) {
            .navbar .container {
                padding-left: 1rem;
                padding-right: 1rem;
            }
            .navbar-brand {
                font-size: 1.2rem;
            }
            main.container {
                margin-top: 1rem !important;
                margin-bottom: 2rem !important;
                padding-left: 1rem;
                padding-right: 1rem;
                max-width: 100%;
            }
            main.container > .d-flex.vh-100 {
                min-height: calc(100vh - 180px);
                height: auto !important;
                padding-top: 1rem;
                padding-bottom: 1rem;
                align-items: flex-start !important;
            }
            main.container > .d-flex.vh-100 > .bg-white {
                padding: 1.5rem !important;
                border-radius: 0.75rem !important;
                box-shadow: 0 0.5rem 1.5rem rgba(15, 23, 42, 0.08) !important;
            }
            h1 {
                font-size: 2rem;
                line-height: 1.2;
            }
            h2 {
                font-size: 1.6rem;
            }
            h4 {
                font-size: 1.2rem;
            }
            .page-hero {
                padding: 2rem 0 1.5rem;
                text-align: left !important;
            }
            .page-hero p {
                font-size: 1rem !important;
            }
            .page-actions {
                display: grid;
                grid-template-columns: 1fr;
            }
            .home-account-actions {
                margin-top: 1rem;
                padding: 1rem;
            }
            .home-account-buttons {
                display: grid;
                grid-template-columns: 1fr;
            }
            .home-trust-list {
                justify-content: flex-start;
                gap: 0.5rem;
            }
            .publish-landing {
                grid-template-columns: 1fr;
                padding: 2rem 0 1rem;
            }
            .publish-panel-header {
                display: block;
            }
            .publish-panel-header h2 {
                margin-bottom: 0.5rem;
            }
            .publish-category-grid {
                grid-template-columns: 1fr;
            }
            .publish-preview-toolbar {
                align-items: flex-start;
                flex-direction: column;
            }
            .publish-preview-actions {
                grid-template-columns: 1fr;
            }
            .registration-steps {
                grid-template-columns: 1fr;
            }
            .btn-lg {
                width: 100%;
                margin-right: 0 !important;
                margin-bottom: 0.75rem;
            }
            .card-body {
                padding: 1rem;
            }
            .feature-card {
                padding: 1rem;
            }
            .search-filters {
                gap: 0.75rem;
            }
            .search-filters > [class*="col-"] {
                margin-bottom: 0 !important;
            }
            .service-card {
                border-radius: 0.75rem;
                box-shadow: 0 0.5rem 1.5rem rgba(15, 23, 42, 0.06);
            }
            .service-result-actions {
                grid-template-columns: 1fr;
            }
            .dashboard-actions {
                display: grid;
                gap: 0.5rem;
            }
            .dashboard-actions .btn {
                width: 100%;
                margin-left: 0 !important;
            }
            .pagination {
                flex-wrap: wrap;
                gap: 0.25rem;
            }
            footer {
                padding-left: 1rem;
                padding-right: 1rem;
            }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container-fluid px-3 px-lg-4">
        <a class="navbar-brand" href="/" th:href="@{/}">
            <img th:src="@{/img/logo.png}" alt="TalentBridge" class="brand-logo-img"><span class="text-dark">Talent</span><span class="bridge-color">Bridge</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/buscar}"><i class="bi bi-search" aria-hidden="true"></i>Buscar servicios</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/publicar-servicio}"><i class="bi bi-stars" aria-hidden="true"></i>Ofrece tu talento</a></li>
                <li class="nav-item" th:if="${#authorization.expression('isAuthenticated()')}">
                    <a class="nav-link" th:href="@{/mis-servicios}"><i class="bi bi-briefcase" aria-hidden="true"></i>Mis servicios</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('isAuthenticated()')}">
                    <a class="nav-link" th:href="@{/perfil}"><i class="bi bi-person-circle" aria-hidden="true"></i>Mi perfil</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('isAnonymous()')}">
                    <a class="nav-link" th:href="@{/login}"><i class="bi bi-box-arrow-in-right" aria-hidden="true"></i>Ingresar</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('isAnonymous()')}">
                    <a class="nav-link" th:href="@{/registro}"><i class="bi bi-person-plus" aria-hidden="true"></i>Registrarse</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('isAuthenticated()')}">
                    <form action="/logout" method="post">
                        <button class="nav-link btn btn-link" type="submit">Cerrar sesión</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- CONTENIDO DINÁMICO -->
<main class="container mt-4 mb-5">
    <div th:replace="${_arg0}"></div>
</main>

<!-- FOOTER -->
<footer>
    TalentBridge &copy; [[${#dates.format(#dates.createNow(), 'yyyy')}]] - Conectamos talentos con necesidades reales
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Choices.js -->
<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
<!-- FilePond -->
<script src="https://unpkg.com/filepond-plugin-image-preview/dist/filepond-plugin-image-preview.min.js"></script>
<script src="https://unpkg.com/filepond/dist/filepond.min.js"></script>
</body>
</html>
